<!DOCTYPE html>

<title>冒险岛怀旧服 · 职业测试</title>

<style>
  :root{
    --bg-a:#08122b;
    --bg-b:#152a5c;
    --bg-c:#3a6bcf;
    --gold:#f5c542;
    --gold-2:#ffd766;
    --ink:#ecf1ff;
    --ink-dim:#a9b6d6;
    --card:rgba(12,22,52,.72);
    --border:rgba(255,255,255,.14);
    --accent:#5aa9ff;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;min-height:100%;-webkit-font-smoothing:antialiased}
  body{
    font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',system-ui,-apple-system,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(1200px 800px at 15% -10%, rgba(90,169,255,.35), transparent 60%),
      radial-gradient(1000px 700px at 100% 10%, rgba(245,197,66,.20), transparent 55%),
      radial-gradient(900px 700px at 50% 110%, rgba(58,107,207,.40), transparent 60%),
      linear-gradient(180deg, var(--bg-a) 0%, var(--bg-b) 55%, #0a1730 100%);
    background-attachment:fixed;
    overflow-x:hidden;
  }
  /* stars background */
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;
    background-image:
      radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,.55), transparent 60%),
      radial-gradient(1.5px 1.5px at 70% 20%, rgba(255,255,255,.4), transparent 60%),
      radial-gradient(1px 1px at 40% 70%, rgba(255,255,255,.35), transparent 60%),
      radial-gradient(1.5px 1.5px at 85% 60%, rgba(255,255,255,.45), transparent 60%),
      radial-gradient(1px 1px at 10% 80%, rgba(255,255,255,.3), transparent 60%),
      radial-gradient(2px 2px at 60% 90%, rgba(255,255,255,.5), transparent 60%);
    opacity:.75;
  }
  /* Floating mob decorations */
  .float-mob{
    position:fixed;pointer-events:none;z-index:0;
    image-rendering:pixelated;
    filter:drop-shadow(0 6px 12px rgba(0,0,0,.4));
    opacity:.85;
    animation:float 6s ease-in-out infinite;
  }
  .float-mob.m1{top:8%;left:4%;width:78px;animation-delay:.2s}
  .float-mob.m2{top:14%;right:5%;width:70px;animation-delay:1.3s}
  .float-mob.m3{bottom:10%;left:6%;width:88px;animation-delay:2.1s}
  .float-mob.m4{bottom:16%;right:7%;width:78px;animation-delay:3.4s}
  @keyframes float{
    0%,100%{transform:translateY(0) rotate(0)}
    50%{transform:translateY(-14px) rotate(-3deg)}
  }
  @media (max-width:720px){
    .float-mob.m1,.float-mob.m2{width:52px;top:6%}
    .float-mob.m3,.float-mob.m4{width:56px;bottom:6%}
  }

  .stage-wrap{
    min-height:100vh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:26px 16px 20px;
    position:relative;z-index:1;
  }

  /* Compact header when in questions */
  header.hero{
    text-align:center;margin-bottom:14px;max-width:720px;
    transition:all .35s ease;
  }
  header.hero.mini{opacity:.7;margin-bottom:8px}
  header.hero.mini h1{font-size:20px;letter-spacing:1px}
  header.hero.mini .brand-tag,header.hero.mini .lead,header.hero.mini small{display:none}
  .brand-tag{
    display:inline-block;font-size:11px;letter-spacing:.35em;
    color:var(--gold);border:1px solid rgba(245,197,66,.4);
    padding:5px 12px;border-radius:999px;background:rgba(245,197,66,.06);
    text-transform:uppercase;
  }
  h1.title{
    font-size:clamp(24px,4.5vw,38px);
    margin:12px 0 4px;letter-spacing:2px;
    background:linear-gradient(180deg,#ffffff 0%, var(--gold-2) 60%, var(--gold) 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 4px 22px rgba(245,197,66,.25);
    font-weight:800;
  }
  h1.title small{
    display:block;font-size:12px;letter-spacing:.4em;color:var(--ink-dim);
    font-weight:400;margin-top:4px;
    -webkit-text-fill-color:var(--ink-dim);
  }
  p.lead{color:var(--ink-dim);max-width:520px;margin:10px auto 0;font-size:14px;line-height:1.65}

  .card{
    position:relative;
    width:100%;max-width:660px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:20px;padding:22px 22px 20px;
    backdrop-filter:blur(14px) saturate(140%);
    -webkit-backdrop-filter:blur(14px) saturate(140%);
    box-shadow:0 24px 60px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.08);
  }

  /* Back arrow */
  .back-arrow{
    position:absolute;left:14px;top:14px;
    width:34px;height:34px;border-radius:50%;
    background:rgba(255,255,255,.08);border:1px solid var(--border);
    display:grid;place-items:center;cursor:pointer;
    color:var(--ink-dim);font-size:18px;line-height:1;
    transition:all .2s ease;user-select:none;
  }
  .back-arrow:hover{background:rgba(255,255,255,.15);color:var(--ink)}

  /* progress */
  .progress{
    display:flex;align-items:center;gap:10px;margin:0 0 14px 42px;
    color:var(--ink-dim);font-size:12px;letter-spacing:.1em;
  }
  .progress-bar{
    flex:1;height:5px;background:rgba(255,255,255,.08);
    border-radius:999px;overflow:hidden;
  }
  .progress-bar > i{
    display:block;height:100%;
    background:linear-gradient(90deg,var(--accent),var(--gold));
    width:0%;transition:width .5s cubic-bezier(.2,.9,.2,1);
    box-shadow:0 0 10px rgba(245,197,66,.5);
  }

  .q-title{
    font-size:20px;line-height:1.5;font-weight:700;margin:4px 0 4px;
  }
  .q-hint{font-size:12px;color:var(--ink-dim);margin-bottom:14px;letter-spacing:.05em}

  .options{display:grid;gap:9px}
  .opt{
    display:flex;align-items:center;gap:12px;
    padding:11px 14px;border-radius:12px;cursor:pointer;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.08);
    transition:all .2s ease;user-select:none;
    min-height:48px;
  }
  .opt:hover{
    background:rgba(255,255,255,.08);
    border-color:rgba(245,197,66,.35);
    transform:translateX(3px);
  }
  .opt.selected{
    background:linear-gradient(135deg,rgba(245,197,66,.18),rgba(90,169,255,.14));
    border-color:var(--gold);
    box-shadow:0 0 0 3px rgba(245,197,66,.18), 0 10px 30px rgba(245,197,66,.15);
  }
  .opt .dot{
    width:18px;height:18px;flex:none;border-radius:50%;
    border:2px solid rgba(255,255,255,.3);
    display:grid;place-items:center;transition:all .2s ease;
  }
  .opt.selected .dot{border-color:var(--gold);background:var(--gold)}
  .opt.selected .dot::after{
    content:"";width:6px;height:6px;border-radius:50%;background:#1a2a52;
  }
  .opt .emoji{font-size:20px;flex:none;filter:drop-shadow(0 2px 6px rgba(0,0,0,.4))}
  .opt .txt{font-size:14.5px;line-height:1.45}

  /* Intro screen */
  .intro-body{padding:6px 4px 6px}
  .meta-grid{
    display:grid;grid-template-columns:repeat(4,1fr);
    gap:8px;margin:14px 0 16px;
  }
  .meta-item{
    background:rgba(255,255,255,.05);border:1px solid var(--border);
    border-radius:10px;padding:10px 6px;text-align:center;
  }
  .meta-item b{display:block;color:var(--gold-2);font-size:18px;line-height:1.2}
  .meta-item span{color:var(--ink-dim);font-size:10px;letter-spacing:.15em}

  .class-strip{
    display:grid;grid-template-columns:repeat(6,1fr);gap:8px;
    margin:10px 0 4px;
  }
  .class-strip .slot{
    background:rgba(255,255,255,.04);border:1px solid var(--border);
    border-radius:10px;padding:8px 4px;text-align:center;
    display:flex;flex-direction:column;align-items:center;gap:4px;
    transition:all .3s ease;
  }
  .class-strip .slot img{
    width:34px;height:34px;object-fit:contain;
    image-rendering:pixelated;
    filter:drop-shadow(0 2px 4px rgba(0,0,0,.5));
  }
  .class-strip .slot span{font-size:10px;color:var(--ink-dim);letter-spacing:.05em}
  .class-strip .slot:hover{transform:translateY(-2px);border-color:rgba(245,197,66,.4)}
  @media (max-width:520px){
    .class-strip{grid-template-columns:repeat(4,1fr)}
    .meta-grid{grid-template-columns:repeat(2,1fr)}
  }

  .btn{
    appearance:none;border:0;cursor:pointer;font:inherit;
    padding:14px 30px;border-radius:12px;font-weight:700;letter-spacing:.15em;
    transition:all .2s ease;font-size:15px;
  }
  .btn-primary{
    background:linear-gradient(135deg,var(--gold-2),var(--gold));
    color:#1a2952;box-shadow:0 8px 24px rgba(245,197,66,.35);
  }
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 12px 28px rgba(245,197,66,.5)}
  .btn-ghost{
    background:rgba(255,255,255,.08);color:var(--ink);
    border:1px solid var(--border);padding:10px 20px;font-size:13px;letter-spacing:.1em;
  }
  .btn-ghost:hover{background:rgba(255,255,255,.14)}

  .start-cta{text-align:center;margin-top:16px}

  /* result */
  .result-hero{text-align:center;padding:6px 0 10px;position:relative}
  .result-portrait{
    width:112px;height:112px;margin:0 auto;position:relative;
    display:grid;place-items:center;
    background:radial-gradient(circle at 50% 40%, rgba(245,197,66,.35), transparent 65%);
    border-radius:50%;
  }
  .result-portrait img{
    width:80px;height:80px;object-fit:contain;
    image-rendering:pixelated;
    filter:drop-shadow(0 4px 20px rgba(245,197,66,.6));
  }
  .job-name{
    font-size:30px;font-weight:800;margin:6px 0 2px;letter-spacing:2px;
    background:linear-gradient(180deg,#ffffff,var(--gold));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .job-cat{color:var(--ink-dim);font-size:13px;letter-spacing:.3em}
  .star-row{
    display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:8px;
  }
  .star-row span{
    background:rgba(255,255,255,.06);border:1px solid var(--border);
    border-radius:8px;padding:5px 10px;font-size:11px;color:var(--ink-dim);letter-spacing:.05em;
  }
  .star-row b{color:var(--gold-2);margin-left:4px;letter-spacing:normal}
  .tagline{color:var(--ink-dim);font-style:italic;margin:12px 0 0;font-size:14px}

  .reason{
    margin-top:16px;padding:14px 16px;border-radius:12px;
    background:linear-gradient(135deg,rgba(90,169,255,.12),rgba(245,197,66,.06));
    border:1px solid rgba(90,169,255,.25);
    line-height:1.7;font-size:14px;
  }
  .reason .label{
    display:inline-block;font-size:10px;letter-spacing:.35em;
    color:var(--gold);margin-bottom:6px;
  }
  .pros-cons{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
  .pros-cons > div{padding:12px;border-radius:10px;font-size:12.5px;line-height:1.6}
  .pros{background:rgba(90,255,169,.08);border:1px solid rgba(90,255,169,.2)}
  .cons{background:rgba(255,107,107,.08);border:1px solid rgba(255,107,107,.2)}
  .pros h4,.cons h4{margin:0 0 6px;font-size:11px;letter-spacing:.2em}
  .pros h4{color:#7dffb3}.cons h4{color:#ffa5a5}

  .runner-ups{margin-top:14px}
  .runner-ups h3{
    font-size:11px;letter-spacing:.35em;color:var(--ink-dim);
    margin:0 0 8px;font-weight:600;
  }
  .runner-list{display:flex;gap:8px;flex-wrap:wrap}
  .runner-tag{
    background:rgba(255,255,255,.05);border:1px solid var(--border);
    border-radius:999px;padding:6px 10px 6px 6px;font-size:12px;
    display:inline-flex;align-items:center;gap:6px;
  }
  .runner-tag img{
    width:22px;height:22px;object-fit:contain;image-rendering:pixelated;
  }
  .runner-tag b{color:var(--gold-2);margin-right:4px}

  .share-row{
    display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:14px;
  }

  footer{
    text-align:center;color:var(--ink-dim);font-size:11px;
    margin-top:18px;letter-spacing:.1em;
  }
  footer a{color:var(--gold-2);text-decoration:none}

  @media (max-width:520px){
    .pros-cons{grid-template-columns:1fr}
    .q-title{font-size:18px}
    .job-name{font-size:26px}
    .card{padding:20px 16px 16px}
    .progress{margin-left:36px}
  }

  .fade{animation:fade .35s ease}
  @keyframes fade{
    from{opacity:0;transform:translateY(6px)}
    to{opacity:1;transform:none}
  }
</style>
</head>

    options:[
      { e:"🌱", t:"零氪或微氪，靠时间和策略", s:{iceMage:3, cleric:2, corsair:2, buccaneer:1} },
      { e:"⚖️", t:"适度氪金，追求性价比", s:{bandit:2, marksman:2, sniper:1, corsair:1} },
      { e:"💎", t:"只要够强，钱不是问题", s:{hermit:3, hero:2, fpMage:1} }
    ]},
  { q:"你更喜欢哪种游戏节奏？", hint:"从新手到大佬的曲线",
    options:[
      { e:"🌅", t:"前期弱一点没关系，大器晚成才够爽", s:{hero:3, corsair:3, buccaneer:1, hermit:1} },
      { e:"🚀", t:"从头到尾都要强，不要有明显短板", s:{iceMage:2, sniper:2, marksman:2, darkKnight:1} },

    ]},

    options:[

      { e:"💫", t:"后排给队友加血 / 加 BUFF", s:{cleric:3, paladin:1, darkKnight:1, buccaneer:1} },
      { e:"⚡", t:"输出全场的主 C", s:{hero:2, hermit:2, sniper:2, marksman:1, corsair:1} },
      { e:"🎒", t:"我更喜欢自己单干", s:{bandit:3, fpMage:2, hermit:1} }
    ]},
  { q:"你偏爱的战斗距离？", hint:"你和敌人之间的距离美学",
    options:[
      { e:"👊", t:"贴脸近战，感受每一击", s:{hero:2, buccaneer:3, darkKnight:1, paladin:1} },
      { e:"🌀", t:"中距离灵活切入", s:{hermit:2, bandit:2, paladin:1, buccaneer:1} },
      { e:"🎯", t:"远距离精确打击", s:{sniper:2, marksman:2, corsair:2, iceMage:1, fpMage:1} }
    ]},
  { q:"视觉审美上你更被哪种风格吸引？", hint:"看图选职业其实很准",
    options:[
      { e:"❄️", t:"冷色系 · 冰霜与闪电", s:{iceMage:3} },

      { e:"👼", t:"圣光、金色、天使系", s:{paladin:3, cleric:2} },

      { e:"🏴‍☠️", t:"火枪、船锚、海盗旗", s:{corsair:3, buccaneer:2} }
    ]},
  { q:"你的社交倾向？", hint:"和别人玩还是自己玩",
    options:[
      { e:"🌚", t:"独狼，一个人玩最自在", s:{bandit:3, fpMage:2, hermit:1, corsair:1} },
      { e:"👯", t:"三两好友组个小队最合适", s:{sniper:2, marksman:2, hero:1, iceMage:1} },
      { e:"🎉", t:"大团队，越热闹越好", s:{cleric:3, paladin:2, darkKnight:2, buccaneer:1} }
    ]},
  { q:"遇到超强 BOSS 你的第一反应？", hint:"面对困难时的样子",
    options:[
      { e:"😤", t:"硬刚，越难越有斗志", s:{hero:3, hermit:1, buccaneer:1} },

      { e:"📣", t:"招呼队友一起，我来抗/加血", s:{paladin:3, cleric:2, darkKnight:1} },

    options:[
      { e:"💪", t:"力拔山兮气盖世", s:{hero:3, darkKnight:1, buccaneer:1} },
      { e:"🧠", t:"智珠在握，运筹帷幄", s:{iceMage:3, fpMage:1, sniper:1} },
      { e:"💖", t:"无欲则刚，为友谊而战", s:{cleric:3, paladin:2} },
      { e:"🌑", t:"神出鬼没，一击致命", s:{hermit:3, bandit:1} },
      { e:"🎯", t:"万军之中取上将首级", s:{sniper:2, marksman:2, hero:1} },
      { e:"🌊", t:"乘风破浪，自由不羁", s:{corsair:2, buccaneer:2, bandit:1} }
    ]}
];

/* ============ 状态 ============ */
const state = {
  step:-1,
  answers:new Array(QUESTIONS.length).fill(null),
  scores:{},
  locked:false,
};
function resetScores(){
  state.scores = {};
  for (const k in CLASSES) state.scores[k] = 0;
}

/* ============ 渲染 ============ */
const stage = document.getElementById("stage");
const hero = document.getElementById("hero");

function render(){
  stage.innerHTML = "";
  if (state.step === -1) { hero.classList.remove("mini"); return renderIntro(); }
  if (state.step === QUESTIONS.length) { hero.classList.add("mini"); return renderResult(); }
  hero.classList.add("mini");
  renderQuestion(state.step);
}

function renderIntro(){
  const el = document.createElement("div");
  el.className = "card fade";
  const strip = CLASS_ORDER.map(id=>{
    const c = CLASSES[id];
    return `<div class="slot" title="${c.name}">
      <img loading="lazy" src="${IMG}${c.item}${R}" alt="${c.name}" />
      <span>${c.name}</span>
    </div>`;
  }).join("");
  el.innerHTML = `
    <div class="intro-body">
      <div class="meta-grid">
        <div class="meta-item"><b>10</b><span>QUESTIONS</span></div>
        <div class="meta-item"><b>12</b><span>CLASSES</span></div>
        <div class="meta-item"><b>≈ 2</b><span>MINUTES</span></div>
        <div class="meta-item"><b>0¥</b><span>NO PAYWALL</span></div>
      </div>
      <p style="margin:0 0 14px;line-height:1.65;color:var(--ink-dim);font-size:13px;text-align:center">
        选完自动进入下一题，别怕手抖 —— 12 个职业，找到最像你的那一个。
      </p>
      <div class="class-strip">${strip}</div>
      <div class="start-cta">
        <button class="btn btn-primary" id="btn-start">开 始 测 试</button>
      </div>
    </div>
  `;
  stage.appendChild(el);
  el.querySelector("#btn-start").onclick = ()=>{
    resetScores();
    state.step = 0;
    render();
  };
}

function renderQuestion(i){
  const q = QUESTIONS[i];
  const el = document.createElement("div");
  el.className = "card fade";
  el.innerHTML = `
    ${i>0 ? `<div class="back-arrow" id="back" title="上一题">‹</div>` : ""}
    <div class="progress">
      <span>Q ${i+1} / ${QUESTIONS.length}</span>
      <div class="progress-bar"><i style="width:${((i+1)/QUESTIONS.length)*100}%"></i></div>
      <span>${Math.round(((i+1)/QUESTIONS.length)*100)}%</span>
    </div>
    <div class="q-title">${q.q}</div>
    <div class="q-hint">${q.hint}</div>
    <div class="options" id="opts"></div>
  `;
  stage.appendChild(el);

  const optsEl = el.querySelector("#opts");
  q.options.forEach((opt, idx)=>{
    const d = document.createElement("div");
    d.className = "opt" + (state.answers[i]===idx ? " selected":"");
    d.innerHTML = `<span class="dot"></span><span class="emoji">${opt.e}</span><span class="txt">${opt.t}</span>`;
    d.onclick = ()=>{
      if (state.locked) return;
      state.locked = true;
      state.answers[i] = idx;
      [...optsEl.children].forEach(c=>c.classList.remove("selected"));
      d.classList.add("selected");
      // brief feedback, then advance without scrolling window
      setTimeout(()=>{
        // rebuild scores from all answers so back-nav is safe
        resetScores();
        for (let k=0;k<=i;k++){
          const idxK = state.answers[k];
          if (idxK===null) continue;
          const s = QUESTIONS[k].options[idxK].s;
          for (const cls in s) state.scores[cls] += s[cls];
        }
        state.step++;
        state.locked = false;
        render();
      }, 320);
    };
    optsEl.appendChild(d);
  });

  const back = el.querySelector("#back");
  if (back) back.onclick = ()=>{
    if (state.locked) return;
    state.step--;
    render();
  };
}

function renderResult(){
  const ranked = Object.entries(state.scores).sort((a,b)=>b[1]-a[1]).filter(([,v])=>v>0);
  const [topId, topScore] = ranked[0];
  const top = CLASSES[topId];
  const runners = ranked.slice(1,4).map(([id,v])=>({...CLASSES[id],score:v}));

  const el = document.createElement("div");
  el.className = "card fade";
  el.innerHTML = `
    <div class="result-hero">
      <div class="result-portrait">
        <img src="${IMG}${top.item}${R}" alt="${top.name}" />
      </div>
      <div class="job-name">${top.name}</div>
      <div class="job-cat">${top.cat} · ${top.role}</div>
      <div class="star-row">
        <span>刷图 <b>${"★".repeat(Math.round(top.stars.farm))}${"☆".repeat(5-Math.round(top.stars.farm))}</b></span>
        <span>后期 <b>${"★".repeat(Math.round(top.stars.late))}${"☆".repeat(5-Math.round(top.stars.late))}</b></span>
        <span>匹配度 <b>${topScore} 分</b></span>
      </div>
      <p class="tagline">"${top.tagline}"</p>
    </div>
    <div class="reason">
      <div class="label">◆ 为什么是它</div>
      ${top.reason}
    </div>
    <div class="pros-cons">
      <div class="pros"><h4>核心优势</h4>${top.pros.map(p=>"· "+p).join("<br>")}</div>
      <div class="cons"><h4>主要劣势</h4>${top.cons.map(p=>"· "+p).join("<br>")}</div>
    </div>
    ${runners.length ? `
      <div class="runner-ups">
        <h3>你的次选</h3>
        <div class="runner-list">
          ${runners.map(r=>`
            <span class="runner-tag">
              <img src="${IMG}${r.item}${RS}" alt="${r.name}" />
              <b>${r.name}</b>${r.score} 分 · ${r.cat}
            </span>`).join("")}
        </div>
      </div>` : ""}
    <div class="share-row">
      <button class="btn btn-ghost" id="btn-share">复制结果</button>
      <button class="btn btn-primary" id="btn-again" style="padding:10px 20px;font-size:13px;letter-spacing:.1em">再测一次</button>
    </div>
  `;
  stage.appendChild(el);

  el.querySelector("#btn-again").onclick = ()=>{
    state.step = -1;
    state.answers = new Array(QUESTIONS.length).fill(null);
    resetScores();
    render();
  };
  el.querySelector("#btn-share").onclick = async ()=>{
    const text = `我在《冒险岛怀旧服职业测试》里的结果是 【${top.name}】(${top.cat}) —— ${top.tagline}`;
    try {
      await navigator.clipboard.writeText(text);
      el.querySelector("#btn-share").textContent = "已复制 ✓";
    } catch(e) { alert(text); }
  };
}

document.getElementById("restart-link").onclick = (e)=>{
  e.preventDefault();
  state.step = -1;
  state.answers = new Array(QUESTIONS.length).fill(null);
  resetScores();
  render();
};

render();
</script>
