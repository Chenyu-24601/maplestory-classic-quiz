    margin-top:40px;padding-bottom:20px;letter-spacing:.1em;

</style>
</head>

    ]
  },
  {

    hint:"和别人玩还是自己玩",
    options:[
      { e:"🌚", t:"独狼，一个人玩最自在", s:{bandit:3, fpMage:2, hermit:1, corsair:1} },
      { e:"👯", t:"三两好友组个小队最合适", s:{sniper:2, marksman:2, hero:1, iceMage:1} },

    ]
  },
  {
    q:"遇到超强 BOSS 你的第一反应？",
    hint:"面对困难时的样子",
    options:[
      { e:"😤", t:"硬刚，越难越有斗志", s:{hero:3, hermit:1, buccaneer:1} },

    ]
  },
  {
    q:"一句话形容你理想中的自己？",
    hint:"最后一题，凭直觉",
    options:[
      { e:"💪", t:"力拔山兮气盖世", s:{hero:3, darkKnight:1, buccaneer:1} },
      { e:"🧠", t:"智珠在握，运筹帷幄", s:{iceMage:3, fpMage:1, sniper:1} },
      { e:"💖", t:"无欲则刚，为友谊而战", s:{cleric:3, paladin:2} },
      { e:"🌑", t:"神出鬼没，一击致命", s:{hermit:3, bandit:1} },
      { e:"🎯", t:"万军之中取上将首级", s:{sniper:2, marksman:2, hero:1} },
      { e:"🌊", t:"乘风破浪，自由不羁", s:{corsair:2, buccaneer:2, bandit:1} }
    ]
  }
];

/* ============ 状态 ============ */
const state = {
  step:-1,   // -1 = intro; 0..N-1 = questions; N = result
  answers:new Array(QUESTIONS.length).fill(null),
  scores:{},
};

function resetScores(){
  state.scores = {};
  for (const k in CLASSES) state.scores[k] = 0;
}

/* ============ 渲染 ============ */
const stage = document.getElementById("stage");

function render(){
  stage.innerHTML = "";
  if (state.step === -1) return renderIntro();
  if (state.step === QUESTIONS.length) return renderResult();
  renderQuestion(state.step);
}

function renderIntro(){
  const el = document.createElement("div");
  el.className = "card fade";
  el.innerHTML = `
    <div class="meta-grid">
      <div class="meta-item"><b>10</b><span>QUESTIONS</span></div>
      <div class="meta-item"><b>12</b><span>CLASSES</span></div>
      <div class="meta-item"><b>≈ 2</b><span>MINUTES</span></div>
      <div class="meta-item"><b>0¥</b><span>NO PAYWALL</span></div>
    </div>
    <p style="margin-top:22px;line-height:1.75;color:var(--ink-dim);font-size:14px">
      冒险岛怀旧服里 <b style="color:var(--gold-2)">五大职业系 · 十二个代表职业</b> 各有性格：
      有拼团队的、有走独狼的，有靠肝的、有靠氪的，也有前期忍着后期起飞的。
      这套测试不问你会不会玩，只问你 <b style="color:var(--gold-2)">是什么样的人</b>——然后给你一个最像你的答案。
    </p>
    <div class="start-cta">
      <button class="btn btn-primary" id="btn-start">开 始 测 试</button>
    </div>
  `;
  stage.appendChild(el);
  el.querySelector("#btn-start").onclick = ()=>{
    resetScores();
    state.step = 0;
    render();
  };
}

function renderQuestion(i){
  const q = QUESTIONS[i];
  const el = document.createElement("div");
  el.className = "card fade";
  el.innerHTML = `
    <div class="progress">
      <span>Q ${i+1} / ${QUESTIONS.length}</span>
      <div class="progress-bar"><i style="width:${((i)/QUESTIONS.length)*100}%"></i></div>
      <span>${Math.round(((i)/QUESTIONS.length)*100)}%</span>
    </div>
    <div class="q-title">${q.q}</div>
    <div class="q-hint">${q.hint}</div>
    <div class="options" id="opts"></div>
    <div class="controls">
      <button class="btn btn-ghost" id="btn-back" ${i===0?"disabled style='visibility:hidden'":""}>上一题</button>
      <button class="btn btn-primary" id="btn-next" disabled>${i===QUESTIONS.length-1?"看结果 →":"下一题 →"}</button>
    </div>
  `;
  stage.appendChild(el);

  const optsEl = el.querySelector("#opts");
  q.options.forEach((opt, idx)=>{
    const d = document.createElement("div");
    d.className = "opt" + (state.answers[i]===idx ? " selected":"");
    d.innerHTML = `<span class="dot"></span><span class="emoji">${opt.e}</span><span class="txt">${opt.t}</span>`;
    d.onclick = ()=>{
      state.answers[i] = idx;
      [...optsEl.children].forEach(c=>c.classList.remove("selected"));
      d.classList.add("selected");
      el.querySelector("#btn-next").disabled = false;
    };
    optsEl.appendChild(d);
  });

  if (state.answers[i]!==null) el.querySelector("#btn-next").disabled = false;

  el.querySelector("#btn-back").onclick = ()=>{
    state.step--;
    render();
    window.scrollTo({top:0,behavior:"smooth"});
  };
  el.querySelector("#btn-next").onclick = ()=>{
    const chosenIdx = state.answers[i];
    if (chosenIdx===null) return;
    // (rebuild scores from all answers so back-navigation is safe)
    resetScores();
    for (let k=0;k<=i;k++){
      const idx = state.answers[k];
      if (idx===null) continue;
      const s = QUESTIONS[k].options[idx].s;
      for (const cls in s) state.scores[cls] += s[cls];
    }
    state.step++;
    render();
    window.scrollTo({top:0,behavior:"smooth"});
  };
}

function renderResult(){
  // pick top
  const ranked = Object.entries(state.scores)
    .sort((a,b)=>b[1]-a[1])
    .filter(([,v])=>v>0);
  const [topId, topScore] = ranked[0];
  const top = CLASSES[topId];
  const runners = ranked.slice(1,4).map(([id,v])=>({...CLASSES[id],score:v}));

  const el = document.createElement("div");
  el.className = "card fade";
  el.innerHTML = `
    <div class="result-hero">
      <div class="job-emoji">${top.emoji}</div>
      <div class="job-name">${top.name}</div>
      <div class="job-cat">${top.cat} · ${top.role}</div>
      <div class="star-row">
        <span>刷图 <b>${"★".repeat(Math.round(top.stars.farm))}${"☆".repeat(5-Math.round(top.stars.farm))}</b></span>
        <span>后期 <b>${"★".repeat(Math.round(top.stars.late))}${"☆".repeat(5-Math.round(top.stars.late))}</b></span>
        <span>匹配度 <b>${topScore} 分</b></span>
      </div>
      <p style="color:var(--ink-dim);font-style:italic;margin:12px 0 0">"${top.tagline}"</p>
    </div>

    <div class="reason">
      <div class="label">◆ 为什么是它</div>
      ${top.reason}
    </div>

    <div class="pros-cons">
      <div class="pros">
        <h4>核心优势</h4>
        ${top.pros.map(p=>"· "+p).join("<br>")}
      </div>
      <div class="cons">
        <h4>主要劣势</h4>
        ${top.cons.map(p=>"· "+p).join("<br>")}
      </div>
    </div>

    ${runners.length ? `
      <div class="runner-ups">
        <h3>你的次选</h3>
        <div class="runner-list">
          ${runners.map(r=>`<span class="runner-tag"><b>${r.emoji} ${r.name}</b> ${r.score} 分 · ${r.cat}</span>`).join("")}
        </div>
      </div>
    ` : ""}

    <div class="share-row">
      <button class="btn btn-ghost" id="btn-share">复制结果</button>
      <button class="btn btn-primary" id="btn-again">再测一次</button>
    </div>
  `;
  stage.appendChild(el);

  el.querySelector("#btn-again").onclick = ()=>{
    state.step = -1;
    state.answers = new Array(QUESTIONS.length).fill(null);
    resetScores();
    render();
    window.scrollTo({top:0,behavior:"smooth"});
  };
  el.querySelector("#btn-share").onclick = async ()=>{
    const text = `我在《冒险岛怀旧服职业测试》里的结果是 【${top.name}】(${top.cat}) —— ${top.tagline}`;
    try {
      await navigator.clipboard.writeText(text);
      el.querySelector("#btn-share").textContent = "已复制 ✓";
    } catch(e) {
      alert(text);
    }
  };
}

/* restart footer link */
document.getElementById("restart-link").onclick = (e)=>{
  e.preventDefault();
  state.step = -1;
  state.answers = new Array(QUESTIONS.length).fill(null);
  resetScores();
  render();
  window.scrollTo({top:0,behavior:"smooth"});
};

render();
</script>
</body>
